<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D x Claude</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono&family=Syne:wght@400;700;800&display=swap');
  :root { --bg:#0a0a0f; --surface:#13131a; --border:#2a2a3a; --accent:#7c6dfa; --accent2:#fa6d9a; --text:#e8e8f0; --muted:#6a6a8a; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; height:100vh; display:grid; grid-template-columns:1fr 380px; grid-template-rows:56px 1fr; overflow:hidden; }
  header { grid-column:1/-1; display:flex; align-items:center; padding:0 24px; border-bottom:1px solid var(--border); background:var(--surface); gap:12px; }
  header h1 { font-size:18px; font-weight:800; } header h1 span { color:var(--accent); }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--accent2); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  #viewer { position:relative; background:radial-gradient(ellipse at 30% 40%,#1a1a2e,#0a0a0f); overflow:hidden; }
  #viewer canvas { display:block; width:100%!important; height:100%!important; }
  #overlay { position:absolute; bottom:20px; left:20px; display:flex; gap:8px; }
  .btn { background:rgba(19,19,26,.9); border:1px solid var(--border); color:var(--text); padding:8px 14px; border-radius:8px; font-family:'Space Mono',monospace; font-size:11px; cursor:pointer; transition:all .2s; }
  .btn:hover { border-color:var(--accent); color:var(--accent); }
  #abtn { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700; }
  #abtn:hover { background:#6a5de8; } #abtn:disabled { opacity:.5; cursor:not-allowed; }
  #info { position:absolute; top:16px; left:16px; background:rgba(19,19,26,.9); border:1px solid var(--border); border-radius:10px; padding:10px 14px; font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); line-height:1.8; }
  #info strong { color:var(--accent); }
  #panel { background:var(--surface); border-left:1px solid var(--border); display:flex; flex-direction:column; }
  #ph { padding:16px 20px; border-bottom:1px solid var(--border); font-size:12px; font-family:'Space Mono',monospace; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
  #msgs { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
  .msg { border-radius:12px; padding:12px 14px; font-size:13px; line-height:1.6; animation:fi .3s ease; }
  @keyframes fi { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .user { background:var(--accent); color:#fff; align-self:flex-end; max-width:90%; }
  .ai { background:#1e1e2e; border:1px solid var(--border); align-self:flex-start; max-width:95%; }
  .sys { background:transparent; border:1px dashed var(--border); color:var(--muted); font-family:'Space Mono',monospace; font-size:11px; text-align:center; }
  .typing { display:flex; gap:4px; padding:4px 0; }
  .typing span { width:6px; height:6px; background:var(--accent); border-radius:50%; animation:bounce 1.2s infinite; }
  .typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-6px);opacity:1} }
  #ia { padding:12px; border-top:1px solid var(--border); display:flex; gap:8px; }
  #ci { flex:1; background:#1e1e2e; border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'Syne',sans-serif; font-size:13px; padding:10px 12px; resize:none; outline:none; height:40px; }
  #ci:focus { border-color:var(--accent); }
  #sb { background:var(--accent); border:none; border-radius:8px; color:#fff; width:40px; height:40px; cursor:pointer; font-size:18px; flex-shrink:0; }
  #sb:disabled { opacity:.4; }
</style>
</head>
<body>
<header><div class="dot"></div><h1>3D <span>x</span> Claude</h1></header>
<div id="viewer">
  <div id="info">Initializing...</div>
  <div id="overlay">
    <button class="btn" onclick="resetCam()">↺ Reset</button>
    <button class="btn" onclick="toggleWire()">⬡ Wireframe</button>
    <button class="btn" id="abtn" onclick="analyze()">✦ Analyze with Claude</button>
  </div>
</div>
<div id="panel">
  <div id="ph">Claude Analysis</div>
  <div id="msgs"><div class="msg sys">Click "Analyze with Claude" or ask anything below.</div></div>
  <div id="ia">
    <textarea id="ci" placeholder="Ask about the model..."></textarea>
    <button id="sb" onclick="send()">→</button>
  </div>
</div>

function b64ToBuffer(b64) {
  const s = atob(b64), buf = new ArrayBuffer(s.length), v = new Uint8Array(buf);
  for (let i = 0; i < s.length; i++) v[i] = s.charCodeAt(i);
  return buf;
}

// ── Scene ─────────────────────────────────────────────────────
const viewer = document.getElementById('viewer');
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputEncoding = THREE.sRGBEncoding;
viewer.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, 1, 0.01, 1000);
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const dl = new THREE.DirectionalLight(0x9988ff, 1.2); dl.position.set(5,10,5); scene.add(dl);
const rl = new THREE.DirectionalLight(0xff88aa, 0.5); rl.position.set(-5,3,-5); scene.add(rl);
scene.add(new THREE.GridHelper(10, 20, 0x2a2a3a, 0x1a1a2a));

let model = null, wire = false;
let sph = { th: 0, ph: Math.PI/3, r: 5 };
let tgt = new THREE.Vector3(0, 1, 0);

// ── GLTFLoader inline (no external dependency) ────────────────
// We'll parse the GLB manually using THREE's built-in capability
function loadGLBFromBuffer(buffer) {
  // GLB header
  const magic = new Uint32Array(buffer, 0, 1)[0];
  if (magic !== 0x46546C67) { // 'glTF'
    document.getElementById('info').textContent = 'Invalid GLB file';
    return;
  }
  
  const version = new Uint32Array(buffer, 4, 1)[0];
  const length = new Uint32Array(buffer, 8, 1)[0];
  
  // Chunk 0: JSON
  const chunk0Len = new Uint32Array(buffer, 12, 1)[0];
  const chunk0Type = new Uint32Array(buffer, 16, 1)[0];
  const jsonBytes = new Uint8Array(buffer, 20, chunk0Len);
  const jsonStr = new TextDecoder().decode(jsonBytes);
  const gltf = JSON.parse(jsonStr);
  
  // Chunk 1: BIN (may not exist)
  let binBuffer = null;
  if (20 + chunk0Len < length) {
    const chunk1Start = 20 + chunk0Len;
    const chunk1Len = new Uint32Array(buffer, chunk1Start, 1)[0];
    binBuffer = buffer.slice(chunk1Start + 8, chunk1Start + 8 + chunk1Len);
  }
  
  buildScene(gltf, binBuffer);
}

function buildScene(gltf, binBuffer) {
  const group = new THREE.Group();
  
  gltf.meshes.forEach(mesh => {
    mesh.primitives.forEach(prim => {
      const geo = new THREE.BufferGeometry();
      
      function getAccessorData(idx) {
        const acc = gltf.accessors[idx];
        const bv = gltf.bufferViews[acc.bufferView];
        const offset = (bv.byteOffset || 0) + (acc.byteOffset || 0);
        const compMap = { 5120:Int8Array,5121:Uint8Array,5122:Int16Array,5123:Uint16Array,5125:Uint32Array,5126:Float32Array };
        const sizeMap = { SCALAR:1,VEC2:2,VEC3:3,VEC4:4,MAT4:16 };
        const Ctor = compMap[acc.componentType];
        const n = sizeMap[acc.type];
        return new Ctor(binBuffer, offset, acc.count * n);
      }
      
      if (prim.attributes.POSITION !== undefined) {
        geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(getAccessorData(prim.attributes.POSITION)), 3));
      }
      if (prim.attributes.NORMAL !== undefined) {
        geo.setAttribute('normal', new THREE.BufferAttribute(new Float32Array(getAccessorData(prim.attributes.NORMAL)), 3));
      }
      if (prim.indices !== undefined) {
        const idxData = getAccessorData(prim.indices);
        geo.setIndex(new THREE.BufferAttribute(new Uint16Array(idxData), 1));
      }
      geo.computeVertexNormals();
      
      const mat = new THREE.MeshStandardMaterial({ color: 0x8888cc, roughness: 0.7, metalness: 0.1 });
      group.add(new THREE.Mesh(geo, mat));
    });
  });
  
  scene.add(group);
  model = group;
  
  // Center
  const box = new THREE.Box3().setFromObject(group);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  group.position.sub(center);
  group.position.y += size.y / 2;
  sph.r = Math.max(size.x, size.y, size.z) * 2.5;
  tgt.set(0, size.y * 0.3, 0);
  
  // Stats
  let verts = 0, tris = 0, meshes = 0;
  group.traverse(c => {
    if (c.isMesh) {
      meshes++;
      if (c.geometry.attributes.position) verts += c.geometry.attributes.position.count;
      if (c.geometry.index) tris += c.geometry.index.count / 3;
    }
  });
  document.getElementById('info').innerHTML =
    '<strong>LowPoly_Male_Base2.glb</strong><br>Meshes: ' + meshes + ' | Verts: ' + verts + ' | Tris: ' + Math.round(tris);
}

// Load the embedded GLB
try {
  loadGLBFromBuffer(b64ToBuffer(GLB_B64));
} catch(e) {
  document.getElementById('info').textContent = 'Load error: ' + e.message;
  console.error(e);
}

// ── Orbit ─────────────────────────────────────────────────────
let drag = false, px = 0, py = 0;
renderer.domElement.addEventListener('mousedown', e => { drag=true; px=e.clientX; py=e.clientY; });
window.addEventListener('mouseup', () => drag=false);
window.addEventListener('mousemove', e => {
  if (!drag) return;
  sph.th -= (e.clientX-px)*0.01; sph.ph = Math.max(0.1,Math.min(Math.PI-0.1,sph.ph-(e.clientY-py)*0.01));
  px=e.clientX; py=e.clientY;
});
renderer.domElement.addEventListener('wheel', e => { sph.r = Math.max(0.5,Math.min(20,sph.r+e.deltaY*0.005)); });

// Touch support
let t0 = null;
renderer.domElement.addEventListener('touchstart', e => { t0={x:e.touches[0].clientX,y:e.touches[0].clientY}; });
renderer.domElement.addEventListener('touchmove', e => {
  if (!t0) return; e.preventDefault();
  sph.th -= (e.touches[0].clientX-t0.x)*0.01;
  sph.ph = Math.max(0.1,Math.min(Math.PI-0.1,sph.ph-(e.touches[0].clientY-t0.y)*0.01));
  t0={x:e.touches[0].clientX,y:e.touches[0].clientY};
}, {passive:false});

function resize() {
  const w=viewer.clientWidth, h=viewer.clientHeight;
  renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix();
}
new ResizeObserver(resize).observe(viewer); resize();

(function animate() {
  requestAnimationFrame(animate);
  camera.position.set(
    tgt.x + sph.r*Math.sin(sph.ph)*Math.sin(sph.th),
    tgt.y + sph.r*Math.cos(sph.ph),
    tgt.z + sph.r*Math.sin(sph.ph)*Math.cos(sph.th)
  );
  camera.lookAt(tgt);
  renderer.render(scene, camera);
})();

window.resetCam = () => { sph={th:0,ph:Math.PI/3,r:5}; };
window.toggleWire = () => {
  wire=!wire;
  if(model) model.traverse(c=>{ if(c.isMesh) c.material.wireframe=wire; });
};
window.getShot = () => { renderer.render(scene,camera); return renderer.domElement.toDataURL('image/jpeg',.85).split(',')[1]; };

// ── Claude ────────────────────────────────────────────────────
const SYS = 'You are a 3D model analyst. The user is viewing a low-poly character basemesh (LowPoly_Male_Base2.glb). Analyze geometry, topology, poly style, proportions, and game/animation use cases. Be concise and helpful.';
let hist = [];

async function claude(text, shot) {
  const content = [];
  if (shot) content.push({type:'image',source:{type:'base64',media_type:'image/jpeg',data:window.getShot()}});
  content.push({type:'text',text});
  hist.push({role:'user',content});
  const r = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYS,messages:hist})
  });
  const d = await r.json();
  const reply = d.content?.[0]?.text || JSON.stringify(d);
  hist.push({role:'assistant',content:[{type:'text',text:reply}]});
  return reply;
}

function addMsg(text,cls) {
  const m=document.createElement('div'); m.className='msg '+cls; m.textContent=text;
  const el=document.getElementById('msgs'); el.appendChild(m); el.scrollTop=el.scrollHeight; return m;
}
function addLoad() {
  const m=document.createElement('div'); m.className='msg ai';
  m.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  const el=document.getElementById('msgs'); el.appendChild(m); el.scrollTop=el.scrollHeight; return m;
}

window.analyze = async () => {
  const btn=document.getElementById('abtn');
  btn.disabled=true; btn.textContent='Analyzing...';
  addMsg('Analyze this 3D model.','user'); const ld=addLoad();
  try { const r=await claude('Analyze this 3D character model - geometry, poly count, topology, proportions, and best use cases.',true); ld.remove(); addMsg(r,'ai'); }
  catch(e) { ld.remove(); addMsg('Error: '+e.message,'sys'); }
  btn.disabled=false; btn.textContent='✦ Analyze with Claude';
};

window.send = async () => {
  const ci=document.getElementById('ci'), text=ci.value.trim(); if(!text)return;
  ci.value=''; document.getElementById('sb').disabled=true;
  addMsg(text,'user'); const ld=addLoad();
  try { const r=await claude(text,false); ld.remove(); addMsg(r,'ai'); }
  catch(e) { ld.remove(); addMsg('Error: '+e.message,'sys'); }
  document.getElementById('sb').disabled=false;
};

document.getElementById('ci').addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} });
</script>
