<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D × Claude</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');
  :root {
    --bg: #0a0a0f; --surface: #13131a; --border: #2a2a3a;
    --accent: #7c6dfa; --accent2: #fa6d9a; --text: #e8e8f0; --muted: #6a6a8a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif;
    height: 100vh; display: grid; grid-template-columns: 1fr 380px;
    grid-template-rows: 56px 1fr; overflow: hidden;
  }
  header {
    grid-column: 1 / -1; display: flex; align-items: center;
    padding: 0 24px; border-bottom: 1px solid var(--border);
    background: var(--surface); gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
  #viewer {
    position: relative;
    background: radial-gradient(ellipse at 30% 40%, #1a1a2e 0%, #0a0a0f 70%);
    overflow: hidden;
  }
  #viewer canvas { display: block; width: 100% !important; height: 100% !important; }
  #viewer-overlay { position: absolute; bottom: 20px; left: 20px; display: flex; gap: 8px; }
  .viewer-btn {
    background: rgba(19,19,26,0.85); border: 1px solid var(--border);
    color: var(--text); padding: 8px 14px; border-radius: 8px;
    font-family: 'Space Mono', monospace; font-size: 11px; cursor: pointer;
    backdrop-filter: blur(8px); transition: all 0.2s;
  }
  .viewer-btn:hover { border-color: var(--accent); color: var(--accent); }
  #analyze-btn { background: var(--accent); border-color: var(--accent); color: white; font-weight: 700; }
  #analyze-btn:hover { background: #6a5de8; border-color: #6a5de8; color: white; }
  #analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .model-info {
    position: absolute; top: 16px; left: 16px;
    background: rgba(19,19,26,0.85); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; backdrop-filter: blur(8px);
    font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); line-height: 1.8;
  }
  .model-info strong { color: var(--accent); }
  #panel { background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
  #panel-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    font-size: 12px; font-family: 'Space Mono', monospace;
    color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
  }
  #messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .msg { border-radius: 12px; padding: 12px 14px; font-size: 13px; line-height: 1.6; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { background: var(--accent); color: white; align-self: flex-end; max-width: 90%; }
  .msg.claude { background: #1e1e2e; border: 1px solid var(--border); color: var(--text); align-self: flex-start; max-width: 95%; }
  .msg.system { background: transparent; border: 1px dashed var(--border); color: var(--muted); font-family: 'Space Mono', monospace; font-size: 11px; text-align: center; }
  .msg.loading { background: #1e1e2e; border: 1px solid var(--border); align-self: flex-start; }
  .typing { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
  .typing span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-6px);opacity:1} }
  #input-area { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  #chat-input {
    flex: 1; background: #1e1e2e; border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px;
    padding: 10px 12px; resize: none; outline: none; transition: border-color 0.2s; height: 40px;
  }
  #chat-input:focus { border-color: var(--accent); }
  #send-btn {
    background: var(--accent); border: none; border-radius: 8px; color: white;
    width: 40px; height: 40px; cursor: pointer; font-size: 16px; transition: background 0.2s; flex-shrink: 0;
  }
  #send-btn:hover { background: #6a5de8; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<header>
  <div class="dot"></div>
  <h1>3D <span>×</span> Claude</h1>
</header>
<div id="viewer">
  <div class="model-info" id="model-info">Loading model...</div>
  <div id="viewer-overlay">
    <button class="viewer-btn" onclick="resetCamera()">↺ Reset</button>
    <button class="viewer-btn" onclick="toggleWireframe()">⬡ Wireframe</button>
    <button class="viewer-btn" id="analyze-btn" onclick="analyzeModel()">✦ Analyze with Claude</button>
  </div>
</div>
<div id="panel">
  <div id="panel-header">Claude Analysis</div>
  <div id="messages">
    <div class="msg system">Model loaded — click "Analyze with Claude" or ask anything below.</div>
  </div>
  <div id="input-area">
    <textarea id="chat-input" placeholder="Ask about the model..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">→</button>
  </div>
</div>

function b64ToArrayBuffer(b64) {
  const bin = atob(b64);
  const buf = new ArrayBuffer(bin.length);
  const view = new Uint8Array(buf);
  for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/loaders/GLTFLoader.js';

const viewer = document.getElementById('viewer');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.outputEncoding = THREE.sRGBEncoding;
viewer.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);
camera.position.set(0, 1.5, 4);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dir = new THREE.DirectionalLight(0x7c6dfa, 1.2);
dir.position.set(5, 10, 5); scene.add(dir);
const rim = new THREE.DirectionalLight(0xfa6d9a, 0.4);
rim.position.set(-5, 3, -5); scene.add(rim);
scene.add(new THREE.GridHelper(10, 20, 0x2a2a3a, 0x1a1a2a));

let modelGroup = null, wireframeMode = false;
let spherical = { theta: 0, phi: Math.PI / 3, radius: 4 };
let target = new THREE.Vector3(0, 0.8, 0);

// Load from embedded base64
const loader = new GLTFLoader();
const arrayBuffer = b64ToArrayBuffer(GLB_B64);
loader.parse(arrayBuffer, '', (gltf) => {
  modelGroup = gltf.scene;
  scene.add(modelGroup);

  const box = new THREE.Box3().setFromObject(modelGroup);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  modelGroup.position.sub(center);
  modelGroup.position.y += size.y / 2;

  spherical.radius = Math.max(size.x, size.y, size.z) * 2.2;
  target.set(0, size.y * 0.3, 0);

  let verts = 0, faces = 0, meshes = 0;
  modelGroup.traverse(c => {
    if (c.isMesh) {
      meshes++;
      if (c.geometry.attributes.position) verts += c.geometry.attributes.position.count;
      if (c.geometry.index) faces += c.geometry.index.count / 3;
    }
  });
  document.getElementById('model-info').innerHTML =
    `<strong>LowPoly_Male_Base2.glb</strong><br>Meshes: ${meshes} &nbsp;|&nbsp; Verts: ${verts} &nbsp;|&nbsp; Tris: ${Math.round(faces)}`;
  window._modelLoaded = true;
}, err => {
  document.getElementById('model-info').textContent = 'Error loading model: ' + err.message;
});

// Orbit
let isDragging = false, prevX = 0, prevY = 0;
renderer.domElement.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  spherical.theta -= (e.clientX - prevX) * 0.01;
  spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi - (e.clientY - prevY) * 0.01));
  prevX = e.clientX; prevY = e.clientY;
});
renderer.domElement.addEventListener('wheel', e => {
  spherical.radius = Math.max(0.5, Math.min(20, spherical.radius + e.deltaY * 0.005));
});

function resize() {
  const w = viewer.clientWidth, h = viewer.clientHeight;
  renderer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix();
}
new ResizeObserver(resize).observe(viewer); resize();

function animate() {
  requestAnimationFrame(animate);
  camera.position.set(
    target.x + spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta),
    target.y + spherical.radius * Math.cos(spherical.phi),
    target.z + spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta)
  );
  camera.lookAt(target);
  renderer.render(scene, camera);
}
animate();

window.resetCamera = () => { spherical = { theta: 0, phi: Math.PI / 3, radius: 4 }; };
window.toggleWireframe = () => {
  wireframeMode = !wireframeMode;
  if (modelGroup) modelGroup.traverse(c => { if (c.isMesh) c.material.wireframe = wireframeMode; });
};
window.getScreenshot = () => { renderer.render(scene, camera); return renderer.domElement.toDataURL('image/jpeg', 0.85).split(',')[1]; };
</script>

<script>
const SYSTEM = `You are a 3D model analyst. The user is viewing a low-poly character basemesh (LowPoly_Male_Base2.glb). Analyze geometry, topology, poly style, proportions, and game/animation use cases. Be concise and insightful.`;
let history = [];

async function callClaude(text, screenshot = false) {
  const content = [];
  if (screenshot && window.getScreenshot) {
    content.push({ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: window.getScreenshot() } });
  }
  content.push({ type: 'text', text });
  history.push({ role: 'user', content });
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: SYSTEM, messages: history })
  });
  const data = await res.json();
  const reply = data.content?.[0]?.text || 'No response.';
  history.push({ role: 'assistant', content: [{ type: 'text', text: reply }] });
  return reply;
}

function addMsg(text, type) {
  const el = document.createElement('div');
  el.className = `msg ${type}`; el.textContent = text;
  const msgs = document.getElementById('messages');
  msgs.appendChild(el); msgs.scrollTop = msgs.scrollHeight;
  return el;
}
function addLoading() {
  const el = document.createElement('div');
  el.className = 'msg loading';
  el.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  const msgs = document.getElementById('messages');
  msgs.appendChild(el); msgs.scrollTop = msgs.scrollHeight;
  return el;
}

window.analyzeModel = async () => {
  const btn = document.getElementById('analyze-btn');
  btn.disabled = true; btn.textContent = '⏳ Analyzing...';
  addMsg('Analyze this 3D model for me.', 'user');
  const loading = addLoading();
  try {
    const reply = await callClaude('Analyze this 3D character model — geometry, poly style, topology, proportions, and game/animation use cases.', true);
    loading.remove(); addMsg(reply, 'claude');
  } catch(e) { loading.remove(); addMsg('Error: ' + e.message, 'system'); }
  btn.disabled = false; btn.textContent = '✦ Analyze with Claude';
};

window.sendMessage = async () => {
  const input = document.getElementById('chat-input');
  const text = input.value.trim(); if (!text) return;
  input.value = ''; document.getElementById('send-btn').disabled = true;
  addMsg(text, 'user'); const loading = addLoading();
  try {
    const reply = await callClaude(text, false);
    loading.remove(); addMsg(reply, 'claude');
  } catch(e) { loading.remove(); addMsg('Error: ' + e.message, 'system'); }
  document.getElementById('send-btn').disabled = false;
};

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
